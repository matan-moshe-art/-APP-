services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: hebrew_analyzer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_ai_interactions.sql:/docker-entrypoint-initdb.d/001_ai_interactions.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hebrew_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      POSTGRES_URL: postgresql://app:app@postgres:5432/hebrew_analyzer
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
